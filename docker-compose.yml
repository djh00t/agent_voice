services:
  agent-voice:
    build:
      context: .
      dockerfile: Dockerfile
    image: agent_voice:local
    container_name: agent_voice
    user: "${AGENT_VOICE_UID:-0}:${AGENT_VOICE_GID:-0}"
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./config:/app/config:ro
      - ./accounting:/app/accounting
      - ./data:/app/data
    environment:
      AGENT_VOICE_CONFIG: /app/config/agent_voice.yaml
      OPENAI_API_KEY: ${OPENAI_API_KEY:?set OPENAI_API_KEY in .env}
      SIP_USERNAME: ${SIP_USERNAME:?set SIP_USERNAME in .env}
      SIP_PASSWORD: ${SIP_PASSWORD:?set SIP_PASSWORD in .env}
      SIP_HOST: ${SIP_HOST:?set SIP_HOST in .env}
      SIP_PORT: ${SIP_PORT:-5060}
      SIP_TRANSPORT: ${SIP_TRANSPORT:-udp}
      SIP_RESOLVE_HOST: ${SIP_RESOLVE_HOST:-true}
      SIP_LOCAL_IP: ${SIP_LOCAL_IP:-}
      SIP_RTP_PORT_MIN: ${SIP_RTP_PORT_MIN:-10000}
      SIP_RTP_PORT_MAX: ${SIP_RTP_PORT_MAX:-20000}
      SIP_REGISTER_EXPIRY_SECS: ${SIP_REGISTER_EXPIRY_SECS:-300}
      SIP_REGISTER_RETRY_SECS: ${SIP_REGISTER_RETRY_SECS:-2}
      SIP_REGISTER_MAX_RETRY: ${SIP_REGISTER_MAX_RETRY:-5}
      SIP_NAT_KEEPALIVE_SECS: ${SIP_NAT_KEEPALIVE_SECS:-25}
      SIP_STUN_SERVER: ${SIP_STUN_SERVER:-}
      SIP_ACCEPT_INCOMING_CALLS: ${SIP_ACCEPT_INCOMING_CALLS:-true}
      SIP_PREFERRED_CODECS: ${SIP_PREFERRED_CODECS:-PCMU,PCMA}
      OPENAI_REALTIME_URL: ${OPENAI_REALTIME_URL:-wss://api.openai.com/v1/realtime}
      OPENAI_AUDIO_API_URL: ${OPENAI_AUDIO_API_URL:-https://api.openai.com/v1/audio/speech}
      OPENAI_TRANSCRIPTION_API_URL: ${OPENAI_TRANSCRIPTION_API_URL:-https://api.openai.com/v1/audio/transcriptions}
      OPENAI_RESPONSES_API_URL: ${OPENAI_RESPONSES_API_URL:-https://api.openai.com/v1/responses}
      OPENAI_TRANSCRIPTION_MODEL: ${OPENAI_TRANSCRIPTION_MODEL:-gpt-4o-transcribe}
      OPENAI_RESPONSE_MODEL: ${OPENAI_RESPONSE_MODEL:-gpt-4o-mini}
      OPENAI_TTS_MODEL: ${OPENAI_TTS_MODEL:-gpt-4o-mini-tts}
      OPENAI_TTS_VOICE: ${OPENAI_TTS_VOICE:-alloy}
      OPENAI_TTS_INSTRUCTIONS: ${OPENAI_TTS_INSTRUCTIONS:-Speak in a cheerful, upbeat, warm, and helpful tone with a friendly Australian accent. Sound engaged and natural, not flat, stiff, or monotone.}
      OPENAI_TRANSCRIPTION_PROMPT: ${OPENAI_TRANSCRIPTION_PROMPT:-}
      OPENAI_TRANSCRIPTION_LANGUAGE: ${OPENAI_TRANSCRIPTION_LANGUAGE:-}
      OPENAI_TTS_FORMAT: ${OPENAI_TTS_FORMAT:-wav}
      OPENAI_RESPONSE_INSTRUCTIONS: ${OPENAI_RESPONSE_INSTRUCTIONS:-You are a helpful voice agent on a phone call. Keep replies brief, natural, and conversational.}
      AGENT_API_LISTEN: ${AGENT_API_LISTEN:-127.0.0.1:8089}
      AUTO_ANSWER_INCOMING: ${AUTO_ANSWER_INCOMING:-true}
      INCOMING_ANSWER_DELAY_MS: ${INCOMING_ANSWER_DELAY_MS:-0}
      INCOMING_GREETING_TEXT: ${INCOMING_GREETING_TEXT:-Welcome}
      TRANSCRIPT_DIR: ${TRANSCRIPT_DIR:-/app/data/transcripts}
      PHONE_BOOK_PATH: ${PHONE_BOOK_PATH:-/app/data/phone_book.json}
      ACCOUNTING_MODEL_CATALOG_PATH: ${ACCOUNTING_MODEL_CATALOG_PATH:-/app/accounting/models.json}
      ACCOUNTING_API_CALLS_CSV_PATH: ${ACCOUNTING_API_CALLS_CSV_PATH:-/app/accounting/api_calls.csv}
      ACCOUNTING_CALL_TOTALS_CSV_PATH: ${ACCOUNTING_CALL_TOTALS_CSV_PATH:-/app/accounting/call_totals.csv}
      ACCOUNTING_PRICING_PAGE_URL: ${ACCOUNTING_PRICING_PAGE_URL:-https://developers.openai.com/api/docs/pricing}
      ACCOUNTING_REFRESH_PRICING_ON_STARTUP: ${ACCOUNTING_REFRESH_PRICING_ON_STARTUP:-true}
      ASSISTANT_NAME: ${ASSISTANT_NAME:-Steve}
      DEFAULT_TIMEZONE: ${DEFAULT_TIMEZONE:-UTC}
      CALL_TURN_SILENCE_MS: ${CALL_TURN_SILENCE_MS:-1200}
      CALL_MIN_UTTERANCE_MS: ${CALL_MIN_UTTERANCE_MS:-400}
      POST_TTS_INPUT_SUPPRESSION_MS: ${POST_TTS_INPUT_SUPPRESSION_MS:-1200}
      CALL_VAD_THRESHOLD: ${CALL_VAD_THRESHOLD:-500}
      AUTO_END_CALLS: ${AUTO_END_CALLS:-true}
      END_CALL_BUFFER_MS: ${END_CALL_BUFFER_MS:-1500}
      CALL_CONTEXT_WINDOW_EVENTS: ${CALL_CONTEXT_WINDOW_EVENTS:-8}
      AGENT_VOICE_LOG_LEVEL: ${AGENT_VOICE_LOG_LEVEL:-info,agent_voice=debug}
      RUST_LOG: ${RUST_LOG:-info,agent_voice=debug}
    command: []
