sip:
  username: null
  password: null
  host: null
  port: 5060
  transport: "udp"
  local_ip: null
  rtp_port_min: 10000
  rtp_port_max: 20000
  register_expiry_secs: 300
  register_retry_secs: 2
  register_max_retry: 5
  nat_keepalive_secs: 25
  stun_server: null
  accept_incoming_calls: true
  preferred_codecs:
    - "PCMU"
    - "PCMA"

openai:
  api_key: null
  realtime_url: "wss://api.openai.com/v1/realtime"
  audio_api_url: "https://api.openai.com/v1/audio/speech"
  transcription_model: "gpt-4o-transcribe"
  tts_model: "gpt-4o-mini-tts"
  tts_voice: "alloy"
  transcription_prompt: null
  transcription_language: null
  tts_format: "wav"

llm:
  provider: "none"

voice:
  provider: "openai"
  openai:
    api_url: "https://api.openai.com/v1/chat/completions"
    model: "gpt-audio-1.5"
    voice: "alloy"
    instructions: "You are a helpful voice agent on a phone call. Keep replies brief, natural, and conversational."
    input_transcription_model: "gpt-4o-transcribe"

agent_api:
  listen: "127.0.0.1:8089"

behavior:
  auto_answer_incoming: true

logging:
  level: "info,agent_voice=debug"
